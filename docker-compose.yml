services:
  jenkins:
    build: ./cd_jenkins
    image: cd_jenkins:latest
    ports:
      - "8080:8080"
      - "50000:50000"
    depends_on:
      - nexus
      - test_fixture
    volumes:
      - ./jenkins_home:/var/jenkins_home
    environment:
      # Relax CSP on archived artifacts so Robot Framework HTML reports
      # (which use inline JS/CSS) render correctly via the browser.
      JAVA_OPTS: "-Dhudson.model.DirectoryBrowserSupport.CSP="
    stop_grace_period: 120s
  nexus:
    image: sonatype/nexus3:latest
    ports:
      - "8081:8081"
    volumes:
      - ./nexus-data:/nexus-data
    stop_grace_period: 120s
  test_fixture:
    build: ./test_fixture
    image: test_fixture:latest
    ports:
      - "8888:8888"
      - "2222:22"
  selenium:
    image: seleniarm/standalone-chromium:latest
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
